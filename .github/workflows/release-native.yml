name: Release Native

on:
  release:
    types: [published]

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'v')
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm ci
      - run: npm run build:native -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: native/crossterm-system-theme.*.node
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run create-npm-dirs

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten downloaded native artifacts
        run: find artifacts -name '*.node' -exec cp {} . \;

      - run: npm run artifacts
      - run: npm run build:ts
      - run: npm run prepublishOnly

      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/*; do
            npm publish "$pkg" --access public
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
